spring.application.name=BookMyStay

# --- DATABASE ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- HIKARI CONNECTION POOL ---
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.binaryTransfer=false


# --- IMPORTANT FOR SUPABASE ---
spring.datasource.hikari.auto-commit=false

# --- JWT ---
jwt.secret=QmFiWUtpZXRIdWRkeV9KV1RfU2VjcmV0X0tleV8yMDI2X1N1cGVyU3Ryb25nMTIzNDU2Nzg5MA==

# --- SERVER ---
server.port=${PORT:8080}

# --- PROFILE ---
spring.profiles.active=local

#---Redis UPSTASH----
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
spring.cache.type=redis